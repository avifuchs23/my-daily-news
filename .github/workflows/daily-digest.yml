name: Daily news digest

on:
  schedule:
    # 03:30 UTC = 06:30 Israel Daylight Time (05:30 in winter).
    - cron: "30 3 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build today's digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python build_digest.py

      - name: Publish
        run: |
          git config user.name "news-agent"
          git config user.email "actions@users.noreply.github.com"
          git add index.html digest.json
          git diff --cached --quiet || git commit -m "Daily digest $(date -u +%F)"
          git push
